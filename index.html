<!DOCTYPE html>

<html>
    <head>
        <title>Data Vis Project 2</title>
        <meta charset="UTF-8">
        <link rel="icon" href="data:;base64,iVBORwOKGO=" />
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <h1>Data Visualization Project 2</h1>
        <select id="sr-type-filter">
            <option value="all">All</option>
            <option value="TRASH, BULK ITEM PICK-UP">Trash Pickup</option>
            <!-- etc -->
        </select>
        <button id = "btn-light">Light Mode</button>
        <button id = "btn-dark">Dark Mode</button>
        
        <label for="color-by-filter">Color By:</label>
            <select id="color-by-filter">
                <option value="none">None (Default)</option>
                <option value="time">Time to Update</option>
                <option value="neighborhood">Neighborhood</option>
                <option value="priority">Priority</option>
                <option value="agency">Responding Agency</option>
            </select>



        <div id="legend-container">
            <div id="map-legend"></div>
        </div>
        <div id="my-map"></div>
        
        <script src="js/d3.v6.min.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/linechart.js"></script>
        <script src="js/leafletMap.js"></script>
        <script src="js/barchart.js"></script>
        <script src="js/barchart2.js"></script>
    
        <script src="js/main.js"></script>
        

        
        <div id="tooltip"></div>
            <h3>Calls Over The Year Timeline</h3>
            <script src="js/linechart.js"></script>
        <svg id="line-chart"></svg>


        <div class="charts-container" style="display: flex; gap: 20px; margin-top: 20px;">
            <div style="flex: 1;">
                <h3>Top Neighborhoods by Requests</h3>
                <svg id="bar-chart"></svg>
                
                <h3 style="margin-top: 30px;">Most Common Request Methods</h3>
                <svg id="method-bar-chart"></svg>

                <h3 style="margin-top: 30px;">Number of Calls by Responding Department</h3>
                <svg id="dept-chart"></svg>

                <h3 style="margin-top: 30px;">Number of Calls by Priority</h3>
                <svg id="chart"></svg>
            </div>
        </div>
        


    </body>
</html>
